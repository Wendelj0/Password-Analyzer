<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <h1>Neon Password Generator</h1>
    <p class="subtitle">
      Create strong passwords and passphrases.
    </p>


    <div class="password-box">

      <input
        type="password"
        id="password"
        readonly
      >

      <button id="toggleBtn">
        Show
      </button>

      <button id="copyBtn">
        Copy
      </button>

    </div>



    <div class="options">

      <label>
        Password Length:
        <span id="lengthValue">16</span>
      </label>

      <input
        type="range"
        id="length"
        min="8"
        max="64"
        value="16"
      >


      <label>
        <input
          type="checkbox"
          id="uppercase"
          checked
        >
        Uppercase letters
      </label>


      <label>
        <input
          type="checkbox"
          id="lowercase"
          checked
        >
        Lowercase letters
      </label>


      <label>
        <input
          type="checkbox"
          id="numbers"
          checked
        >
        Numbers
      </label>


      <label>
        <input
          type="checkbox"
          id="symbols"
          checked
        >
        Symbols
      </label>


      <label>
        <input
          type="checkbox"
          id="avoidAmbiguous"
        >
        Avoid ambiguous characters
      </label>


      <label>
        <input
          type="checkbox"
          id="passphrase"
        >
        Generate passphrase
      </label>

    </div>



    <div class="strength">

      <p>
        Strength:
        <span id="strengthText">
          Strong
        </span>
      </p>


      <p>
        Entropy:
        <span id="entropyText">
          0 bits
        </span>
      </p>


      <div class="strength-bar">
        <div id="strengthFill"></div>
      </div>


      <p id="warningText"></p>

    </div>



    <button
      id="generateBtn"
      class="generate-btn"
    >
      Generate Password
    </button>



    <!-- NEW PASSWORD VAULT BUTTON -->

    <a
      href="vault.html"
      style="text-decoration:none;"
    >

      <button
        class="generate-btn"
        style="margin-top:12px;"
      >

        🔐 Open Password Vault

      </button>

    </a>



    <section class="history-section">

      <h2>
        History
      </h2>

      <ul id="historyList"></ul>


      <button id="clearHistoryBtn">

        Clear History

      </button>

    </section>


  </main>


  <script src="script.js"></script>

</body>
</html>
