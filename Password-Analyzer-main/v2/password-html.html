<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberGuard | Password Vault</title>
  <link rel="stylesheet" href="password-css.css">
</head>
<body>

  <button id="toggleTheme" class="theme-toggle">🌙</button>

  <div class="container">
    <div class="shield-icon">🛡️</div>
    <h2>Security Check</h2>
    <p class="subtitle">Analyze password entropy</p>

    <input type="password" id="password" placeholder="Enter secure passphrase...">

    <div class="strength-bar">
      <div id="strengthFill" class="strength-fill"></div>
    </div>

    <div id="strengthLabel" class="label">Ready to Scan</div>

    <ul class="requirements">
      <li id="char-len">8+ Characters</li>
      <li id="has-upper">Uppercase Letter</li>
      <li id="has-lower">Lowercase Letter</li>
      <li id="has-num">Numeric Digit</li>
      <li id="has-spec">Special Character</li>
    </ul>
  </div>

  <script src="password-javascript.js"></script>
</body>
</html>
